<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日做事记录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #e8f4fd 0%, #dbeafe 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            color: #1e3a5f;
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        header .date {
            color: #4A90E2;
            font-size: 16px;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(74, 144, 226, 0.1);
        }

        .input-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .input-group input {
            flex: 1;
            min-width: 150px;
            padding: 14px 18px;
            border: 2px solid #e1e8f0;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s ease;
            outline: none;
        }

        .input-group input:focus {
            border-color: #4A90E2;
            box-shadow: 0 0 0 4px rgba(74, 144, 226, 0.1);
        }

        .input-group input::placeholder {
            color: #a0aec0;
        }

        .time-inputs {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .time-inputs label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #4A90E2;
            font-size: 14px;
            font-weight: 500;
        }

        .time-inputs input {
            width: 80px;
            padding: 10px 12px;
            border: 2px solid #e1e8f0;
            border-radius: 10px;
            font-size: 14px;
            text-align: center;
            outline: none;
            transition: all 0.3s ease;
        }

        .time-inputs input:focus {
            border-color: #4A90E2;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4A90E2 0%, #357abd 100%);
            color: white;
            width: 100%;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(74, 144, 226, 0.3);
        }

        .btn-secondary {
            background: #f0f4f8;
            color: #4A90E2;
        }

        .btn-secondary:hover {
            background: #e1e8f0;
        }

        .btn-danger {
            background: #fee;
            color: #e53e3e;
            padding: 6px 12px;
            font-size: 13px;
        }

        .btn-danger:hover {
            background: #fed7d7;
        }

        .task-list {
            list-style: none;
        }

        .task-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: #f8fafc;
            border-radius: 12px;
            margin-bottom: 10px;
            transition: all 0.3s ease;
            border-left: 4px solid #4A90E2;
        }

        .task-item:hover {
            background: #edf2f7;
        }

        .task-info h3 {
            color: #2d3748;
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 6px;
        }

        .task-time {
            display: flex;
            gap: 16px;
            font-size: 13px;
            color: #718096;
        }

        .task-time span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .task-time .actual-time {
            color: #4A90E2;
            font-weight: 500;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #a0aec0;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .summary-card {
            background: linear-gradient(135deg, #4A90E2 0%, #5a9fed 50%, #6ab0f5 100%);
            color: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
        }

        .summary-card h2 {
            font-size: 18px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .summary-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 20px;
        }

        .stat-item {
            text-align: center;
            padding: 16px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 12px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 13px;
            opacity: 0.9;
        }

        .reflection-section {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
        }

        .reflection-section h3 {
            color: #1e3a5f;
            font-size: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .reflection-content {
            background: #f8fafc;
            border-radius: 10px;
            padding: 16px;
            line-height: 1.8;
            color: #4a5568;
            font-size: 14px;
            min-height: 100px;
        }

        .reflection-content.loading {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .loading-dots::after {
            content: '';
            animation: dots 1.5s infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }

        .btn-reflection {
            background: white;
            color: #4A90E2;
            width: 100%;
            margin-top: 16px;
        }

        .btn-reflection:hover {
            background: #f0f4f8;
        }

        .clear-btn {
            text-align: center;
            margin-top: 16px;
        }

        .clear-btn button {
            background: transparent;
            border: none;
            color: #a0aec0;
            font-size: 13px;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .clear-btn button:hover {
            background: #fee;
            color: #e53e3e;
        }

        @media (max-width: 480px) {
            body {
                padding: 12px;
            }

            header h1 {
                font-size: 24px;
            }

            .card {
                padding: 18px;
            }

            .summary-stats {
                grid-template-columns: repeat(3, 1fr);
                gap: 8px;
            }

            .stat-value {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📋 每日做事记录</h1>
            <div class="date" id="currentDate"></div>
        </header>

        <div class="card">
            <div class="input-group">
                <input type="text" id="taskInput" placeholder="输入事项名称..." />
            </div>
            <div class="time-inputs">
                <label>
                    预估用时
                    <input type="number" id="estimatedTime" min="1" placeholder="分钟" />
                </label>
                <label>
                    实际用时
                    <input type="number" id="actualTime" min="1" placeholder="分钟" />
                </label>
            </div>
            <button class="btn btn-primary" onclick="addTask()">添加事项</button>
        </div>

        <div class="card">
            <h2 style="color: #1e3a5f; font-size: 18px; margin-bottom: 16px;">今日事项</h2>
            <ul class="task-list" id="taskList"></ul>
            <div class="empty-state" id="emptyState">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M9 12h6M9 16h6" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <p>还没有记录任何事项<br/>开始添加你的第一个待办吧</p>
            </div>
            <div class="clear-btn" id="clearBtn" style="display: none;">
                <button onclick="clearAllTasks()">清空今日记录</button>
            </div>
        </div>

        <div class="summary-card" id="summaryCard" style="display: none;">
            <h2>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
                </svg>
                今日汇总
            </h2>
            <div class="summary-stats">
                <div class="stat-item">
                    <div class="stat-value" id="totalTasks">0</div>
                    <div class="stat-label">完成事项</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="totalTime">0</div>
                    <div class="stat-label">总用时(分钟)</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="avgTime">0</div>
                    <div class="stat-label">平均用时</div>
                </div>
            </div>
            <div class="reflection-section">
                <h3>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#4A90E2" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M12 16v-4M12 8h.01"/>
                    </svg>
                    AI 智能复盘
                </h3>
                <div class="reflection-content" id="reflectionContent">
                    点击下方按钮，获取今日复盘建议
                </div>
                <button class="btn btn-reflection" id="reflectionBtn" onclick="generateReflection()">
                    生成复盘建议 ✨
                </button>
            </div>
        </div>
    </div>

    <script>
        // 获取今日日期字符串
        function getTodayKey() {
            const today = new Date();
            return `daily-tasks-${today.getFullYear()}-${today.getMonth() + 1}-${today.getDate()}`;
        }

        // 格式化日期显示
        function formatDate() {
            const today = new Date();
            const weekDays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
            const year = today.getFullYear();
            const month = today.getMonth() + 1;
            const day = today.getDate();
            const weekDay = weekDays[today.getDay()];
            return `${year}年${month}月${day}日 ${weekDay}`;
        }

        // 加载今日日期
        document.getElementById('currentDate').textContent = formatDate();

        // 从 localStorage 加载任务
        function loadTasks() {
            const tasks = JSON.parse(localStorage.getItem(getTodayKey()) || '[]');
            return tasks;
        }

        // 保存任务到 localStorage
        function saveTasks(tasks) {
            localStorage.setItem(getTodayKey(), JSON.stringify(tasks));
        }

        // 添加任务
        function addTask() {
            const taskInput = document.getElementById('taskInput');
            const estimatedTime = document.getElementById('estimatedTime');
            const actualTime = document.getElementById('actualTime');

            const taskName = taskInput.value.trim();
            const estimated = parseInt(estimatedTime.value) || 0;
            const actual = parseInt(actualTime.value) || 0;

            if (!taskName) {
                alert('请输入事项名称');
                return;
            }

            const tasks = loadTasks();
            tasks.push({
                id: Date.now(),
                name: taskName,
                estimatedTime: estimated,
                actualTime: actual,
                createdAt: new Date().toISOString()
            });

            saveTasks(tasks);
            taskInput.value = '';
            estimatedTime.value = '';
            actualTime.value = '';
            taskInput.focus();

            renderTasks();
        }

        // 删除任务
        function deleteTask(id) {
            const tasks = loadTasks().filter(task => task.id !== id);
            saveTasks(tasks);
            renderTasks();
        }

        // 清空所有任务
        function clearAllTasks() {
            if (confirm('确定要清空今日所有记录吗？')) {
                localStorage.removeItem(getTodayKey());
                renderTasks();
            }
        }

        // 渲染任务列表
        function renderTasks() {
            const tasks = loadTasks();
            const taskList = document.getElementById('taskList');
            const emptyState = document.getElementById('emptyState');
            const clearBtn = document.getElementById('clearBtn');
            const summaryCard = document.getElementById('summaryCard');

            if (tasks.length === 0) {
                taskList.innerHTML = '';
                emptyState.style.display = 'block';
                clearBtn.style.display = 'none';
                summaryCard.style.display = 'none';
                return;
            }

            emptyState.style.display = 'none';
            clearBtn.style.display = 'block';
            summaryCard.style.display = 'block';

            taskList.innerHTML = tasks.map(task => `
                <li class="task-item">
                    <div class="task-info">
                        <h3>${escapeHtml(task.name)}</h3>
                        <div class="task-time">
                            ${task.estimatedTime ? `<span>预估: ${task.estimatedTime}分钟</span>` : ''}
                            ${task.actualTime ? `<span class="actual-time">实际: ${task.actualTime}分钟</span>` : ''}
                        </div>
                    </div>
                    <button class="btn btn-danger" onclick="deleteTask(${task.id})">删除</button>
                </li>
            `).join('');

            updateSummary(tasks);
        }

        // HTML 转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 更新汇总统计
        function updateSummary(tasks) {
            const totalTasks = tasks.length;
            const totalTime = tasks.reduce((sum, task) => sum + (task.actualTime || 0), 0);
            const avgTime = totalTasks > 0 ? Math.round(totalTime / totalTasks) : 0;

            document.getElementById('totalTasks').textContent = totalTasks;
            document.getElementById('totalTime').textContent = totalTime;
            document.getElementById('avgTime').textContent = avgTime;
        }

        // 生成 AI 复盘
        async function generateReflection() {
            const tasks = loadTasks();
            const reflectionContent = document.getElementById('reflectionContent');
            const reflectionBtn = document.getElementById('reflectionBtn');

            if (tasks.length === 0) {
                reflectionContent.textContent = '请先添加一些事项，我会根据你的记录生成复盘建议';
                return;
            }

            // 显示加载状态
            reflectionContent.innerHTML = '<span class="loading-dots">正在思考中</span>';
            reflectionContent.classList.add('loading');
            reflectionBtn.disabled = true;
            reflectionBtn.textContent = '生成中...';

            // 构建任务摘要
            const taskSummary = tasks.map(t => {
                const time = t.actualTime ? `${t.actualTime}分钟` : '未记录';
                const estimate = t.estimatedTime ? `预估${t.estimatedTime}分钟` : '';
                return `- ${t.name}（实际${time}${estimate ? ', ' + estimate : ''}）`;
            }).join('\n');

            const totalTime = tasks.reduce((sum, t) => sum + (t.actualTime || 0), 0);
            const avgTime = Math.round(totalTime / tasks.length);

            const prompt = `你是一位高效时间管理顾问。请根据以下今日工作记录，提供简洁实用的复盘建议：

今日事项：
${taskSummary}

统计：共${tasks.length}项，总用时${totalTime}分钟，平均用时${avgTime}分钟

请从以下角度给出3-4条简短复盘建议：
1. 时间效率分析
2. 预估与实际的差距
3. 改进建议

要求：
- 语言简洁、口语化，像朋友聊天一样
- 每条建议控制在30字以内
- 用emoji点缀
- 直接给出建议，不需要重复问题`;

            try {
                const response = await fetch('https://api.zhting.top/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer pk-free-zhting'
                    },
                    body: JSON.stringify({
                        model: 'gpt-4o-mini',
                        messages: [
                            { role: 'user', content: prompt }
                        ],
                        max_tokens: 500,
                        temperature: 0.7
                    })
                });

                if (!response.ok) {
                    throw new Error('API 请求失败');
                }

                const data = await response.json();
                const reflection = data.choices[0].message.content;

                reflectionContent.textContent = reflection;
                reflectionContent.classList.remove('loading');

            } catch (error) {
                console.error('复盘生成失败:', error);
                reflectionContent.innerHTML = '复盘生成失败，请稍后重试 🤔<br/><small style="color:#a0aec0">提示：检查网络连接后再次尝试</small>';
                reflectionContent.classList.remove('loading');
            }

            reflectionBtn.disabled = false;
            reflectionBtn.textContent = '重新生成复盘 ✨';
        }

        // 回车键添加任务
        document.getElementById('taskInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                addTask();
            }
        });

        document.getElementById('actualTime').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                addTask();
            }
        });

        // 初始化渲染
        renderTasks();
    </script>
</body>
</html>
